services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sca-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      BasicAuth__Username: ${BASIC_AUTH_USERNAME:-admin}
      BasicAuth__Password: ${BASIC_AUTH_PASSWORD:-admin123}
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: ${OLLAMA_MODEL:-llama3.2:1b}
      Redis__ConnectionString: redis:6379,abortConnect=false
    depends_on:
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    container_name: sca-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: sca-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: sca-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-llama3.2:1b}"]

volumes:
  ollama-data:
